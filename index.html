<html lang="es">
<head>
<meta charset="UTF-8">

<title>Control Anuales Sociedades — San Miguel Contadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1A5FAD;--blue-dark:#0F4280;--blue-light:#EBF3FC;--blue-mid:#3B7DD8;
  --green:#16803C;--green-bg:#DCFCE7;--green-border:#86EFAC;
  --red:#B91C1C;--red-bg:#FEE2E2;--red-border:#FCA5A5;
  --amber:#92400E;--amber-bg:#FEF3C7;--amber-border:#FCD34D;
  --gray:#6B7280;--gray-light:#F3F4F6;--gray-border:#E5E7EB;
  --surface:#FFFFFF;--bg:#F1F5F9;--text:#111827;--text-muted:#6B7280;
  --radius:10px;--radius-sm:7px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --shadow:0 4px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --shadow-lg:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#0F4280 0%,#1A5FAD 50%,#2563EB 100%)}
.login-box{background:var(--surface);border-radius:16px;padding:44px 40px;max-width:380px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
.login-logo{width:48px;height:48px;background:linear-gradient(135deg,var(--blue),var(--blue-mid));border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:22px}
.login-box h2{color:var(--blue);font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.login-box p{color:var(--text-muted);font-size:13px;margin-bottom:28px}
.login-box input{width:100%;border:1.5px solid var(--gray-border);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;margin-bottom:12px;background:#fff;transition:border-color .2s,box-shadow .2s;outline:none}
.login-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,173,.12)}
.login-box button{background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:#fff;border:none;border-radius:var(--radius-sm);padding:11px 24px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;width:100%;letter-spacing:.2px;transition:opacity .15s,transform .1s}
.login-box button:hover{opacity:.92;transform:translateY(-1px)}
.login-box .error{color:var(--red);font-size:12px;margin-top:8px;min-height:18px}
#app{display:none}
.header{background:linear-gradient(135deg,#0F4280 0%,var(--blue) 60%,#2563EB 100%);color:#fff;padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;box-shadow:0 2px 12px rgba(15,66,128,.35)}
.header-brand{display:flex;align-items:center;gap:12px}
.header-icon{width:32px;height:32px;background:rgba(255,255,255,.18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.header-title{font-size:16px;font-weight:700;letter-spacing:-.2px}
.header-sub{font-size:11px;opacity:.72;margin-top:1px;font-weight:400}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.role-badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.role-admin{background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.25)}
.role-read{background:var(--amber-bg);color:var(--amber)}
.yr-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:var(--radius-sm);color:#fff;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.yr-btn:hover{background:rgba(255,255,255,.22)}
.nav{display:flex;gap:1px;background:var(--surface);border-bottom:1px solid var(--gray-border);padding:0 20px;overflow-x:auto;position:sticky;top:58px;z-index:99;box-shadow:var(--shadow-sm)}
.nav button{padding:12px 16px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:12.5px;font-weight:500;font-family:'Inter',sans-serif;border-radius:0;white-space:nowrap;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.nav button:hover{color:var(--blue)}
.nav button.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.content{padding:22px 24px;max-width:1440px;margin:0 auto}
.stitle{margin:0 0 18px;font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.stitle::after{content:'';display:block;width:36px;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue-mid));border-radius:2px;margin-top:6px}
.card{background:var(--surface);border:1px solid var(--gray-border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.kpi{flex:1 1 130px;background:var(--surface);border:1px solid var(--gray-border);border-radius:var(--radius);padding:16px 18px;text-align:center;min-width:110px;box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.kpi-num{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1.1}
.kpi-label{font-size:11px;color:var(--text-muted);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--gray-light)}
th{text-align:left;padding:9px 12px;border-bottom:2px solid var(--gray-border);font-weight:600;font-size:11px;color:var(--text-muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
td{padding:9px 12px;border-bottom:1px solid var(--gray-border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap;letter-spacing:.2px}
.badge-p{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-a{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-nc{background:#FFF4ED;color:#C2500A;border:1px solid #FDBA74}
.badge-sd{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.badge-ep{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-t{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.urg-v{background:#7F1D1D;color:#fff;border-radius:6px;padding:3px 9px}
.urg-u{background:var(--red-bg);color:var(--red);border-radius:6px;padding:3px 9px}
.urg-p{background:var(--amber-bg);color:var(--amber);border-radius:6px;padding:3px 9px}
.urg-ok{background:var(--green-bg);color:var(--green);border-radius:6px;padding:3px 9px}
input[type="text"],input[type="number"],input[type="password"]{border:1.5px solid var(--gray-border);border-radius:var(--radius-sm);padding:6px 10px;font-size:12.5px;font-family:'Inter',sans-serif;background:#fff;box-sizing:border-box;outline:none;transition:border-color .2s,box-shadow .2s}
input[type="text"]:focus,input[type="number"]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,173,.1)}
select{border:1.5px solid var(--gray-border);border-radius:var(--radius-sm);padding:5px 8px;font-size:11.5px;font-family:'Inter',sans-serif;background:#fff;cursor:pointer;outline:none;transition:border-color .2s}
select:focus{border-color:var(--blue)}
.date-input{border:1.5px solid var(--gray-border);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;background:#fff;width:126px;text-align:center;letter-spacing:1px;font-family:'Inter',sans-serif;outline:none}
.date-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,173,.1)}
.btn{background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 18px;font-size:12.5px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.1px;transition:opacity .15s,transform .1s;box-shadow:0 2px 6px rgba(26,95,173,.3)}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-s{background:transparent;color:var(--blue);border:1.5px solid var(--blue);border-radius:var(--radius-sm);padding:6px 14px;font-size:11.5px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:background .15s}
.btn-s:hover{background:var(--blue-light)}
.btn-d{background:#DC2626;color:#fff;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:11.5px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .15s}
.btn-d:hover{opacity:.85}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filter-bar input{max-width:240px}
.obl-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.obl-tab{border:1.5px solid var(--gray-border);border-radius:20px;padding:5px 14px;font-size:11.5px;font-weight:500;font-family:'Inter',sans-serif;background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .15s}
.obl-tab:hover{border-color:var(--blue);color:var(--blue)}
.obl-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.modal-bg{position:fixed;inset:0;background:rgba(15,20,40,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-box{background:var(--surface);border-radius:14px;padding:28px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-box h3{margin:0 0 18px;font-size:17px;font-weight:700;letter-spacing:-.2px;color:var(--blue)}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.wf-box{margin-top:14px;padding:14px;background:var(--blue-light);border-radius:var(--radius-sm);border:1px solid #BFDBFE}
.wf-title{font-size:12px;font-weight:700;color:var(--blue-dark);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.wf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.wf-item{background:#fff;border-radius:var(--radius-sm);padding:8px 10px;border:1px solid #BFDBFE}
.wf-item label{font-size:10px;color:var(--blue-dark);font-weight:600;display:block;margin-bottom:3px}
.cm-box{margin-top:12px;padding:12px 14px;background:#FAF5FF;border-radius:var(--radius-sm);border:1px solid #DDD6FE}
.cm-title{font-size:11px;font-weight:700;color:#5B21B6;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.note-box{margin-top:10px;padding:8px 12px;background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius-sm);font-size:11.5px;color:var(--amber)}
.row-done{background:#FEFCE8 !important}
.row-done:hover{background:#FEF9C3 !important}
.row-bad{background:#FEF2F2 !important}
.row-bad:hover{background:#FEE2E2 !important}
.clickable{cursor:pointer;transition:background .1s}
.clickable:hover{background:#F8FAFC}
.trunc{max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-bar{display:flex;align-items:center;gap:6px}
.progress-track{flex:1;height:6px;background:var(--gray-border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.ml-auto{margin-left:auto}
.status-sel{border-radius:20px;font-weight:600;padding:2px 6px;font-size:10.5px;font-family:'Inter',sans-serif}
.back-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;padding:0;margin-bottom:14px;display:flex;align-items:center;gap:4px;transition:opacity .15s}
.back-btn:hover{opacity:.7}
.det-header{border-left:4px solid var(--blue);padding-left:14px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.det-header h2{margin:0;font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.det-header .sub{font-size:12.5px;color:var(--text-muted);margin-top:5px}
.hist-row{display:flex;gap:8px;margin-top:4px}
.hist-col{text-align:center}
.hist-col .yr{font-size:10px;color:var(--text-muted);margin-bottom:3px;font-weight:600;text-transform:uppercase}
.readonly-msg{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius-sm);padding:9px 16px;font-size:12px;color:var(--amber);margin-bottom:16px;text-align:center;font-weight:500}
@media(max-width:768px){.content{padding:14px 12px}.header{padding:0 16px;flex-wrap:wrap;height:auto;padding-top:10px;padding-bottom:10px}.kpi{flex:1 1 100px;padding:10px 12px}.kpi-num{font-size:24px}}
@media print{#login-screen,.nav,.header,.filter-bar,.btn,.btn-s,.btn-d,.obl-tabs,.back-btn,.readonly-msg{display:none!important}#app{display:block!important}.content{padding:0}}
</style>
</head>
<body>

<div class="header-right"><span class="role-badge" id="role-badge"></span><button class="yr-btn" id="exp-btn" onclick="exportHtml()" style="display:none">⬇ Exportar HTML</button><button class="yr-btn" id="yr-btn" onclick="openYrCfg()"></button><div style="font-size:11px;opacity:.75;font-weight:500" id="header-date"></div></div>

<script>
/* ─── Auth ─── */
const PWD_ADMIN="SanMiguel2026!";
const PWD_READ="consulta2026";
let isAdmin=false;
let pendingChanges=false;
function checkPwd(){
  const v=document.getElementById('pwd-input').value;
  if(v===PWD_ADMIN){isAdmin=true;document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';init()}
  else if(v===PWD_READ){isAdmin=false;document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';init()}
  else{document.getElementById('pwd-error').textContent='Contraseña incorrecta.';document.getElementById('pwd-input').value=''}
}

/* ─── Constants ─── */
const ANALYSTS=["YANINA ALARCON","BRIAN VALDEZ","MELINA PLASTANO","ALBINO BARRIOS"];
const OBLS=["ganancias","bsPersonales","balanceARCA","cm05","regInfPartSoc","djIBCABA","djIBBsAs"];

const WFST=["","EN PROCESO","TERMINADO"];
const IBOPS=["CM","Local CABA","Local Bs As","No inscripta"];
const TODAY=new Date().toISOString().slice(0,10);

/* ─── Helpers ─── */
const fmtD=d=>{if(!d||d==="N/C")return d||"—";const p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0]};
const daysTo=d=>{if(!d||d==="N/C")return 9999;return Math.ceil((new Date(d)-new Date(TODAY))/864e5)};
const badgeCls=s=>s==="PRESENTADA"?"badge-p":s==="ADEUDADA"?"badge-a":s==="N/C"?"badge-nc":s==="EN PROCESO"?"badge-ep":s==="TERMINADO"?"badge-t":"badge-sd";
const badge=s=>'<span class="badge '+badgeCls(s)+'">'+(s||"NO VENCIDO")+'</span>';
const urgCls=d=>d<0?"urg-v":d<=7?"urg-u":d<=30?"urg-p":"urg-ok";
const urgLbl=d=>d<0?"VENCIDO":d<=7?"URGENTE":"PRÓXIMO";
const eo=h=>{const y={};h.forEach(yr=>y[yr]="");return{d:"",y,cs:"",nt:""}};
const nO=h=>({ganancias:{...eo(h),wf:["","","","","","","",""]},bsPersonales:eo(h),balanceARCA:eo(h),cm05:{...eo(h),co:""},regInfPartSoc:eo(h),djIBCABA:eo(h),djIBBsAs:eo(h)});

/* Date helpers: DD/MM/AAAA <-> YYYY-MM-DD */
function dateToDisplay(iso){if(!iso||iso==="N/C")return"";const p=iso.split("-");return p[2]+"/"+p[1]+"/"+p[0]}
function displayToDate(txt){if(!txt)return"";const p=txt.replace(/[^0-9]/g,"/").split("/").filter(x=>x);if(p.length===3&&p[0].length<=2&&p[1].length<=2&&p[2].length===4){const d=p[0].padStart(2,"0"),m=p[1].padStart(2,"0");return p[2]+"-"+m+"-"+d}return""}
function handleDateInput(el,cid,ok){
  let v=el.value.replace(/[^0-9/]/g,"");
  if(v.length===2&&!v.includes("/"))v+="/";
  if(v.length===5&&v.split("/").length===2)v+="/";
  el.value=v;
}

/* ─── Confirm helper ─── */
function confirmAndRun(msg,fn){if(!isAdmin)return;if(confirm(msg)){fn()}}

  document.getElementById("header-sub").textContent="Control Anuales Sociedades "+S.years.cur;

  const yb=document.getElementById("yr-btn");

  rb.className="role-badge "+(isAdmin?"role-admin":"role-read");
  renderNav();
  const m=document.getElementById("main-content");
  const rdMsg=isAdmin?"":'<div class="readonly-msg">Modo consulta — los cambios requieren acceso de administrador</div>';
  if(S.view==="dashboard")m.innerHTML=rdMsg+vDash();
  else if(S.view==="clientes")m.innerHTML=rdMsg+vCl();
  else if(S.view==="detail")m.innerHTML=rdMsg+vDet();
  else if(S.view==="obligacion")m.innerHTML=rdMsg+vObl();
  else if(S.view==="vencimientos")m.innerHTML=rdMsg+vVto();
  else if(S.view==="workflow")m.innerHTML=rdMsg+vWf();
  else if(S.view==="analistas")m.innerHTML=rdMsg+vAn();
}
function renderNav(){const tabs=[["dashboard","Dashboard"],["clientes","Clientes"],["obligacion","Obligación"],["vencimientos","Vencimientos"],["workflow","Workflow"],["analistas","Analistas"]];document.getElementById("nav").innerHTML=tabs.map(([k,l])=>'<button class="'+(S.view===k||(S.view==="detail"&&k==="clientes")?"active":"")+'" onclick="go(\''+k+'\')">'+l+'</button>').join("")}
function go(v){if(S.view==="detail"&&pendingChanges&&!confirm("Hay cambios pendientes. ¿Confirmar y salir?"))return;pendingChanges=false;S.view=v;render()}
function goBack(){if(S.view==="detail"&&pendingChanges&&!confirm("Hay cambios pendientes. ¿Confirmar y salir?"))return;pendingChanges=false;S.view="clientes";render();}
function goDetail(id){S.selId=id;S.view="detail";render()}
function closeModal(){document.getElementById("modal-bg").style.display="none"}

/* ─── Computed ─── */
function getDeadlines(){const r=[];S.clients.forEach(c=>{OBLS.forEach(k=>{const o=c.o[k];if(!o||o.d==="N/C"||!o.d)return;if(o.cs==="PRESENTADA"||o.cs==="N/C")return;const d=daysTo(o.d);if(d<=60)r.push({cn:c.n,a:c.a,ol:OLBL[k],dt:o.d,d,cs:o.cs,id:c.id})})});return r.sort((a,b)=>a.d-b.d)}
function getStats(){let p=0,a=0,s=0;S.clients.forEach(c=>{OBLS.forEach(k=>{const v=c.o[k]?.cs;if(v==="PRESENTADA")p++;else if(v==="ADEUDADA")a++;else if(v!=="N/C")s++})});const dl=getDeadlines();return{p,a,s,v:dl.filter(d=>d.d<0).length,p7:dl.filter(d=>d.d>=0&&d.d<=7).length}}
function isAllDone(c){return OBLS.every(k=>{const v=c.o[k]?.cs;return v==="PRESENTADA"||v==="N/C"})}
function isAnyAdeudada(c){return OBLS.some(k=>c.o[k]?.cs==="ADEUDADA")}
function getFiltered(){return S.clients.filter(c=>{if(S.search&&!c.n.toLowerCase().includes(S.search.toLowerCase()))return false;if(S.filtA&&c.a!==S.filtA)return false;if(S.filtS&&!OBLS.some(k=>c.o[k]?.cs===S.filtS))return false;return true})}

/* ─── Mutation with confirm ─── */

function updH(cid,ok,yr,v){const c=S.clients.find(x=>x.id===cid);if(c){if(!c.o[ok].y)c.o[ok].y={};c.o[ok].y[yr]=v;persist();render()}}
function updWf(cid,i,v){const c=S.clients.find(x=>x.id===cid);if(c){c.o.ganancias.wf[i]=v;persist();render()}}
function updC(cid,f,v){const c=S.clients.find(x=>x.id===cid);if(c){c[f]=v;persist();render()}}

function cUpdWf(cid,i,v){if(!isAdmin)return;if(S.view==="detail"){updWf(cid,i,v);pendingChanges=true}else{confirmAndRun("¿Cambiar paso "+(i+1)+" a "+(v||"Pendiente")+"?",()=>updWf(cid,i,v))}}

function addClient(){if(!isAdmin)return;const n=document.getElementById("add-n").value;if(!n)return;if(!confirm("¿Agregar cliente "+n+"?"))return;const c={id:Math.max(...S.clients.map(x=>x.id),0)+1,n,a:document.getElementById("add-a").value,c:parseInt(document.getElementById("add-c").value)||0,m:parseInt(document.getElementById("add-m").value)||12,ib:document.getElementById("add-ib").value,o:nO(S.years.hist)};S.clients.push(c);persist();closeModal();render()}
function delClient(id){if(!isAdmin)return;const c=S.clients.find(x=>x.id===id);if(!confirm("¿Eliminar a "+c.n+"? No se puede deshacer."))return;S.clients=S.clients.filter(x=>x.id!==id);if(S.selId===id){S.selId=null;S.view="clientes"}persist();closeModal();render()}
function saveYears(){if(!isAdmin)return;if(!confirm("¿Guardar configuración de años?"))return;S.years.cur=parseInt(document.getElementById("yr-cur").value)||2025;S.years.hist=[0,1,2,3].map(i=>parseInt(document.getElementById("yr-h"+i).value)||2020);persist();closeModal();render()}
async function exportHtml(){
  if(!isAdmin)return;
  if(!confirm("¿Exportar HTML con los datos actuales?\n\nSe descargará un archivo index.html que deberás subir a GitHub para que el resto del equipo vea los cambios."))return;
  try{
    const resp=await fetch(window.location.href);
    if(!resp.ok)throw new Error("HTTP "+resp.status);
    let html=await resp.text();
    const newData=JSON.stringify(S.clients);
    const dataRegex=/const INIT_DATA=\[[\s\S]*?\];/;
    if(!dataRegex.test(html))throw new Error("No se encontró INIT_DATA en el HTML fuente");
    html=html.replace(dataRegex,"const INIT_DATA="+newData+";");
    const yearsRegex=/years:\{cur:\d+,hist:\[[^\]]+\]\}/;
    if(!yearsRegex.test(html))throw new Error("No se encontró configuración de años en el HTML fuente");
    html=html.replace(yearsRegex,"years:"+JSON.stringify(S.years));
    const blob=new Blob([html],{type:"text/html;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="index.html";document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setTimeout(()=>alert("Archivo descargado.\n\nPróximos pasos:\n1. Ir a github.com/Maximendi/VENCIMIENTOS-ANUALES\n2. Click en index.html\n3. Click en el lápiz (editar)\n4. Borrar todo el contenido y pegar el nuevo\n5. Commit changes\n6. Esperar 2 minutos"),100);
  }catch(e){
    alert("Error al exportar: "+e.message+"\n\nNota: esta función solo funciona desde el sitio publicado en GitHub Pages, no abriendo el archivo localmente.");
  }
}

.cs)+'</td><td style="font-size:11px;color:#555">'+d.a+'</td></tr>').join("")+'</tbody></table></div></div>'}

if(k==="cm05"&&o.co!==undefined){h+='<div class="cm-box"><div class="cm-title">Coeficientes</div>'+(isAdmin?'<select onchange="cUpdO('+c.id+',\'cm05\',\'co\',this.value,\'coeficientes\')">'+["","EN PROCESO","TERMINADO","N/C"].map(v=>'<option value="'+v+'"'+(v===(o.co||"")?" selected":"")+'>'+(v||"— Pend. —")+'</option>').join("")+'</select>':badge(o.co))+'</div>'}
h+='</div>'});return h}

function vObl(){return '<h2 class="stitle">Vista por Obligación</h2><div class="obl-tabs">'+OBLS.map(k=>'<button class="obl-tab'+(S.oblF===k?" active":"")+'" onclick="S.oblF=\''+k+'\';render()">'+OLBL[k]+'</button>').join("")+'</div><div style="overflow-x:auto"><table><thead><tr><th>Cliente</th><th>Vto.</th><th>Días</th><th>'+S.years.cur+'</th>'+S.years.hist.map(yr=>'<th>'+yr+'</th>').join("")+'<th>Notas</th>'+(S.oblF==="ganancias"?"<th>WF</th>":"")+(S.oblF==="cm05"?"<th>Coef.</th>":"")+'</tr></thead><tbody>'+S.clients.map(c=>{const o=c.o[S.oblF];if(!o)return"";const d=daysTo(o.d);const wd=S.oblF==="ganancias"?(o.wf?.filter(s=>s==="TERMINADO").length||0):0;return'<tr class="clickable" onclick="goDetail('+c.id+')"><td class="trunc" style="font-weight:600">'+c.n+'</td><td>'+fmtD(o.d)+'</td><td>'+(o.d==="N/C"?"—":'<span style="color:'+(d<0?"#721c24":d<=30?"#854F0B":"#555")+';font-weight:600">'+(d<0?Math.abs(d)+"d vdo":d+"d")+'</span>')+'</td><td style="text-align:center">'+badge(o.cs)+'</td>'+S.years.hist.map(yr=>'<td style="text-align:center">'+badge(o.y?.[yr])+'</td>').join("")+'<td style="font-size:10px;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#854F0B">'+(o.nt||"—")+'</td>'+(S.oblF==="ganancias"?'<td style="text-align:center"><span style="font-size:10px;font-weight:600;color:'+(wd===8?"#155724":"#854F0B")+'">'+wd+'/8</span></td>':"")+(S.oblF==="cm05"?'<td style="text-align:center">'+badge(o.co)+'</td>':"")+'</tr>'}).join("")+'</tbody></table></div>'}

function vVto(){return '<h2 class="stitle">Vencimientos — '+(isAdmin?"Editar Fechas":"Consulta")+'</h2><div class="obl-tabs">'+OBLS.map(k=>'<button class="obl-tab'+(S.oblF===k?" active":"")+'" onclick="S.oblF=\''+k+'\';render()">'+OLBL[k]+'</button>').join("")+'</div><div style="overflow-x:auto"><table><thead><tr><th>Cliente</th><th>CUIT</th><th>Cierre</th><th>IIBB</th><th>Fecha Vto.</th><th>Días</th>'+(isAdmin?'<th>Acción</th>':"")+'</tr></thead><tbody>'+S.clients.map(c=>{const o=c.o[S.oblF];if(!o)return"";const d=daysTo(o.d);const nc=o.d==="N/C";return'<tr><td style="font-weight:600">'+c.n+'</td><td style="text-align:center">'+c.c+'</td><td style="text-align:center">'+c.m+'</td><td style="font-size:11px">'+c.ib+'</td><td>'+(nc?'<span style="color:#888">N/C</span>':dateField(c.id,S.oblF,o.d))+'</td><td>'+(nc?"—":'<span style="color:'+(d<0?"#721c24":d<=30?"#854F0B":"#555")+';font-weight:600">'+(d<0?Math.abs(d)+"d vdo":d+"d")+'</span>')+'</td>'+(isAdmin?'<td>'+(nc?'<button class="btn-s" style="padding:3px 8px;font-size:10px" onclick="cToggleNC('+c.id+',\''+S.oblF+'\',false)">Habilitar</button>':'<button class="btn-s" style="padding:3px 8px;font-size:10px" onclick="cToggleNC('+c.id+',\''+S.oblF+'\',true)">N/C</button>')+'</td>':"")+'</tr>'}).join("")+'</tbody></table></div>'}

function vWf(){return '<h2 class="stitle">Workflow DJ Ganancias</h2><div style="overflow-x:auto"><table><thead><tr><th>Cliente</th>'+WFSTEPS.map((s,i)=>'<th style="font-size:9px;text-align:center;max-width:85px">'+(i+1)+'. '+s+'</th>').join("")+'<th style="text-align:center">%</th></tr></thead><tbody>'+S.clients.map(c=>{const wf=c.o.ganancias?.wf||[];const dn=wf.filter(s=>s==="TERMINADO").length;const pc=Math.round(dn/8*100);return'<tr><td class="trunc clickable" style="font-weight:600;font-size:11px" onclick="goDetail('+c.id+')">'+c.n+'</td>'+WFSTEPS.map((_,i)=>'<td style="text-align:center;padding:4px 2px">'+(isAdmin?'<select style="font-size:9px;padding:2px 3px;width:100%;background:'+(wf[i]==="TERMINADO"?"#d4edda":wf[i]==="EN PROCESO"?"#FFF8EC":"#fff")+'" onchange="cUpdWf('+c.id+','+i+',this.value)">'+WFST.map(v=>'<option value="'+v+'"'+(v===(wf[i]||"")?" selected":"")+'>'+(v||"—")+'</option>').join("")+'</select>':badge(wf[i]))+'</td>').join("")+'<td style="text-align:center"><div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width:'+pc+'%;background:'+(pc===100?"#28a745":"#EF9F27")+'"></div></div><span style="font-size:10px;font-weight:600;color:'+(pc===100?"#155724":"#854F0B")+';min-width:28px">'+pc+'%</span></div></td></tr>'}).join("")+'</tbody></table></div>'}

function vAn(){return '<h2 class="stitle">Vista por Analista</h2>'+ANALYSTS.map(a=>{const cs=S.clients.filter(c=>c.a===a);const ad=cs.reduce((ac,c)=>ac+OBLS.filter(k=>c.o[k]?.cs==="ADEUDADA").length,0);const pr=cs.reduce((ac,c)=>ac+OBLS.filter(k=>c.o[k]?.cs==="PRESENTADA").length,0);const pd=cs.reduce((ac,c)=>ac+OBLS.filter(k=>!c.o[k]?.cs).length,0);return'<div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h4 style="margin:0;font-size:14px;color:#185FA5">'+a+'</h4><span style="font-size:12px;color:#555">'+cs.length+' clientes</span></div><div style="display:flex;gap:10px;margin-bottom:10px"><span style="font-size:12px"><b style="color:#155724">'+pr+'</b> pres.</span><span style="font-size:12px"><b style="color:#721c24">'+ad+'</b> adeud.</span><span style="font-size:12px"><b style="color:#854F0B">'+pd+'</b> s/dato</span></div><div style="overflow-x:auto"><table><thead><tr><th style="font-size:10px">Cliente</th>'+OBLS.map(k=>'<th style="font-size:9px;text-align:center">'+OLBL[k].split(" ")[0]+'</th>').join("")+'</tr></thead><tbody>'+cs.map(c=>'<tr class="clickable" onclick="goDetail('+c.id+')"><td style="font-size:11px;font-weight:600">'+c.n+'</td>'+OBLS.map(k=>'<td style="text-align:center">'+badge(c.o[k]?.cs)+'</td>').join("")+'</tr>').join("")+'</tbody></table></div></div>'}).join("")}

function init(){load();render()}
</script>
</body>
</html>
